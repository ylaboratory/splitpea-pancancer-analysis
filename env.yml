  - pip
  - pandas
  - numpy
  - networkx
  - matplotlib
  - seaborn
  - scikit-learn
  - lifelines
  - scipy
  - r-base
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-rstatix
  - r-ggridges
  - r-gridextra
  - r-scales
